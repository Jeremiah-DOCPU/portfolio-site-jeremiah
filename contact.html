<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremiah Dom-Ogbonna | Contact</title>

    <!-- Link to stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Shared navigation -->
    <header>
        <nav class="navbar">
            <h1 class="logo">Jeremiah Dom-Ogbonna</h1>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="videoDemo.html">Video Demo</a></li>
                <li><a href="report.html">Report</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 
            Contact introduction:
            This gives a quick explanation before the form.
        -->
        <section class="contact-intro">
            <h2>Contact Me</h2>
            <p>
                If you would like to get in touch with me, you can use the form below.
            </p>
        </section>

        <!-- 
            Contact form:
            Each label is correctly connected to an input or textarea
            using matching for and id values.
        -->
        <section class="contact-form-section">
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your name" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email address" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea 
                        id="message" 
                        name="message" 
                        rows="6" 
                        placeholder="Write your message here" 
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-button">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Jeremiah Dom-Ogbonna</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
